<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presupuesto · Urbano</title>

  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>

  <link rel="shortcut icon" href="./assets/images.png" type="image/x-icon">
  <link rel="stylesheet" href="./assets/style.css" />

  <style>
    /* ===== PAGINADOR VISTA PREVIA ===== */
    #previewNav {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    #reviewNav button {
      background: none;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 4px 14px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .15s;
      line-height: 1.6;
    }
    #previewNav button {
      background: none;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 4px 14px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .15s;
      line-height: 1.6;
    }
    #previewNav button:hover:not(:disabled) { background: #f1f5f9; }
    #previewNav button:disabled { opacity: .35; cursor: default; }
    #pvPageCount { font-size: .85rem; color: #64748b; min-width: 48px; text-align: center; }

    .page-continuation-header {
      font-size: .85rem;
      color: #64748b;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #e2e8f0;
      overflow: hidden;
    }

    /* ===== MODAL IMPORTAR TEXTO ===== */
    #importModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.45); }
    .modal-box {
      position: relative;
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      width: min(500px, 92vw);
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal-box h3 { margin: 0; font-size: 1.1rem; }
    .modal-hint { margin: 0; font-size: .82rem; color: #64748b; line-height: 1.6; }
    .modal-hint code { background: #f1f5f9; padding: 1px 5px; border-radius: 4px; font-size: .8rem; }
    .import-textarea {
      width: 100%; box-sizing: border-box;
      border: 1px solid #cbd5e1; border-radius: 8px;
      padding: 10px; font-size: .95rem; font-family: monospace; resize: vertical;
    }
    .import-preview { margin: 0; font-size: .8rem; color: #16a34a; min-height: 1.2em; word-break: break-word; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <section class="card generador">
      <h1>Generador de Presupuestos</h1>
      <h2>Formulario</h2>

      <div class="row">
        <div>
          <label>Cliente</label>
          <input id="customer" type="text" placeholder="Nombre del cliente" />
        </div>
        <div>
          <label>Dirección</label>
          <input id="address" type="text" placeholder="Dirección" />
        </div>
      </div>
      <div class="row">
        <div>
          <label>RIF</label>
          <input id="rif" type="text" placeholder="RIF" />
        </div>
      </div>

      <div class="row" style="margin-top:10px">
        <div>
          <label>Fecha</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label>Moneda (visual)</label>
          <input id="currency" type="text" value=" $" />
        </div>
      </div>

      <div class="header-items">
        <h2>Ítems</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn" id="importText" type="button">📝 Importar texto</button>
          <button class="btn" id="addItem" type="button">➕ Agregar ítem</button>
        </div>
      </div>

      <div id="items" class="items"></div>

      <div class="totals">
        <small class="muted">Se calcula automáticamente</small>
        <div class="badge" id="totalBadge">Total: 0,00 $</div>
      </div>

      <div class="toolbar">
        <button class="btn" id="seed" type="button">📋 Cargar ejemplo</button>
        <button class="btn primary" id="download" type="button">🧾 Descargar PDF</button>
      </div>
    </section>

    <aside class="preview-wrap">
      <div class="card preview">
        <h2>Vista previa</h2>

        <!-- Paginador ◀ 1/2 ▶ -->
        <div id="previewNav">
          <button id="pvPrev" type="button">&#8592;</button>
          <span id="pvPageCount">1 / 1</span>
          <button id="pvNext" type="button">&#8594;</button>
        </div>

        <!-- Páginas renderizadas por render.js -->
        <div id="pdfTarget" class="pdf">
          <div id="previewPagesContainer"></div>
        </div>

        <!-- Elementos "fantasma" para compatibilidad con events.js (ocultos) -->
        <div style="display:none">
          <span id="pvCustomer">—</span>
          <span id="pvAddress"></span>
          <span id="pvRif"></span>
          <span id="pvDate">—</span>
          <table><tbody id="pvBody"></tbody></table>
          <span id="pvGrand">0,00 $</span>
        </div>

        <div class="toolbar" style="margin-top:12px">
          <button class="btn ghost" id="download2" type="button">⬇️ Descargar PDF</button>
        </div>
      </div>
    </aside>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
